<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QR Code Generator</title>
  <meta name="description"
  content="Generate QR codes instantly for free using our fast QR code generator website.">

  <meta name="keywords"
  content="QR code generator, free QR code, online QR maker, pintu qr generator">

  <meta name="author" content="Pintu Sah Rauniyar">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
    }

    .container{
      background:white;
      padding:30px;
      border-radius:15px;
      width:350px;
      text-align:center;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    h1{
      margin-bottom:10px;
      color:#333;
    }

    p{
      font-size:14px;
      color:#666;
      margin-bottom:20px;
    }

    input{
      width:100%;
      padding:12px;
      border:2px solid #ddd;
      border-radius:8px;
      outline:none;
      margin-bottom:15px;
      font-size:16px;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#007bff;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#0056b3;
      transform:translateY(-3px) scale(0.9);
    }

    #imgBox{
      margin:20px;
      display:none;
    }

    img{
      width:200px;
      height:200px;
      border:5px solid #eee;
      padding:10px;
      border-radius:10px;
    }
       
  </style>
</head>

<body>

  <div class="container">
    <h1>QR Code Generator</h1>

    <p>
      Enter any text or website link below to generate your QR Code instantly.
    </p>

    <input type="text" id="qrText" placeholder="Enter text or URL">

<button onclick="generateQR()">Generate QR Code</button>

<div id="imgBox">
    <img id="qrImage" src="">
</div>
    <button id="downloadBtn" style="display:none;">Download QR Code</button>
  </div>


  <script>
    let qrText = document.getElementById("qrText");
let qrImage = document.getElementById("qrImage");
let downloadBtn = document.getElementById("downloadBtn");

function generateQR() {
    if (qrText.value.length > 0) {

        let qrUrl =
            "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="
            + encodeURIComponent(qrText.value);

        qrImage.src = qrUrl;
        imgBox.style.display = "block";
        // Show download button
        downloadBtn.style.display = "inline-block";

        // Set download link
        downloadBtn.addEventListener("click", async () => {
    const response = await fetch(qrImage.src);
    const blob = await response.blob();

    const url = window.URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "QRCode.png";

    document.body.appendChild(a);
    a.click();

    document.body.removeChild(a);
    window.URL.revokeObjectURL(url);
});
    }
}

// Generate QR when Enter is pressed
qrText.addEventListener("keypress", function (event) {
    if (event.key === "Enter") {
        generateQR();
    }
});
  </script>

</body>
</html>
